<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест на зрение — Georgian Optics</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f4f4f9; color: #333; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .optotype { font-weight: bold; line-height: 1; margin: 20px 0; }
        button { background: #0088cc; color: white; border: none; padding: 15px 30px; border-radius: 10px; font-size: 18px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Проверка зрения</h2>
        <p>Видите ли вы эти буквы четко?</p>
        <div class="optotype" style="font-size: 80px;">Ш</div>
        <div class="optotype" style="font-size: 50px;">Б</div>
        <div class="optotype" style="font-size: 30px;">М</div>
        <div class="optotype" style="font-size: 20px;">Н</div>
        <br>
        <button onclick="sendResult('1.0 (Норма)')">Вижу все отлично</button>
        <button onclick="sendResult('0.5 (Нужна диагностика)')" style="background: #cc3300;">Вижу не все</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function sendResult(score) {
            const data = { action: 'vision_test_result', score: score };
            tg.sendData(JSON.stringify(data));
            tg.close();
        }
    </script>
</body>
</html>
