<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест на зрение — Georgian Optics</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 15px; background: #f4f4f9; color: #333; margin: 0; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        .optotype { font-weight: bold; line-height: 1.2; letter-spacing: 5px; margin: 10px 0; color: #000; }
        .info-text { font-size: 14px; color: #666; margin-bottom: 20px; }
        button { width: 100%; border: none; padding: 12px; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 8px; transition: 0.3s; }
        .btn-good { background: #28a745; color: white; }
        .btn-warn { background: #ffc107; color: #000; }
        .btn-bad { background: #dc3545; color: white; }
    </style>
</head>
<body>
    <div class="card">
        <h3>Проверка зрения</h3>
        <p class="info-text">Держите телефон на расстоянии 30-40 см от глаз</p>
        
        <div class="optotype" style="font-size: 45px;">Ш Б</div>
        <div class="optotype" style="font-size: 30px;">М Н К</div>
        <div class="optotype" style="font-size: 20px;">Ы М Б Ш</div>
        <div class="optotype" style="font-size: 12px;">И К Н Ш М</div>
        <div class="optotype" style="font-size: 8px;">Б К Ш Ы М И</div>
        
        <br>
        <button class="btn-good" onclick="sendResult('1.0 (Отлично)')">Вижу даже самые мелкие</button>
        <button class="btn-warn" onclick="sendResult('0.7 (Хорошо)')">Вижу средние строки</button>
        <button class="btn-bad" onclick="sendResult('0.4 (Нужна проверка)')">Вижу только верхние</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function sendResult(score) {
            const data = { action: 'vision_test_result', score: score };
            tg.sendData(JSON.stringify(data));
            tg.close();
        }
    </script>
</body>
</html>
