<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vision Test — Georgian Optics</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Courier New', Courier, monospace; text-align: center; padding: 10px; background: #fff; color: #000; margin: 0; }
        .container { max-width: 380px; margin: auto; border: 1px solid #ddd; padding: 15px; border-radius: 10px; }
        .header { font-family: sans-serif; font-size: 14px; margin-bottom: 15px; color: #666; font-weight: bold; }
        .instruction { font-family: sans-serif; background: #f9f9f9; padding: 10px; border-radius: 5px; margin-bottom: 15px; font-size: 13px; line-height: 1.4; border: 1px solid #eee; }
        .row { font-weight: bold; letter-spacing: 5px; line-height: 1.3; margin: 3px 0; display: flex; justify-content: center; align-items: center; }
        .v01 { font-size: 36px; } .v02 { font-size: 28px; } .v03 { font-size: 20px; }
        .v04 { font-size: 16px; } .v06 { font-size: 11px; } .v10 { font-size: 5px; }
        .controls { margin-top: 20px; display: grid; grid-template-columns: 1fr; gap: 8px; font-family: sans-serif; }
        button { border: none; padding: 12px; border-radius: 5px; cursor: pointer; font-size: 13px; font-weight: bold; }
        .btn-black { background: #000; color: #fff; }
        .btn-gray { background: #f0f0f0; border: 1px solid #ccc; }
        #step-right { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">GEORGIAN OPTICS</div>

        <div id="step-left">
            <div class="instruction"><b>Step 1:</b> Cover your <b>RIGHT</b> eye.<br><b>Шаг 1:</b> Закройте <b>ПРАВЫЙ</b> глаз.</div>
            <div class="row v01">Ш Б</div><div class="row v02">М Н К</div><div class="row v03">Ы М Б Ш</div>
            <div class="row v04">Б К Ш М Ы</div><div class="row v06">Ш И Н Ы Б К</div><div class="row v10">Н К И Ш М Ы Б</div>
            <div class="controls">
                <button class="btn-black" onclick="nextStep('Left: 1.0')">I see 10th row / Вижу 10-ю строку</button>
                <button class="btn-gray" onclick="nextStep('Left: 0.4-0.6')">Middle rows / Средние строки</button>
                <button class="btn-gray" onclick="nextStep('Left: Low')">Top rows / Только верхние</button>
            </div>
        </div>

        <div id="step-right">
            <div class="instruction"><b>Step 2:</b> Cover your <b>LEFT</b> eye.<br><b>Шаг 2:</b> Закройте <b>ЛЕВЫЙ</b> глаз.</div>
            <div class="row v01">Ш Б</div><div class="row v02">М Н К</div><div class="row v03">Ы М Б Ш</div>
            <div class="row v04">Б К Ш М Ы</div><div class="row v06">Ш И Н Ы Б К</div><div class="row v10">Н К И Ш М Ы Б</div>
            <div class="controls">
                <button class="btn-black" onclick="finishTest('Right: 1.0')">I see 10th row / Вижу 10-ю строку</button>
                <button class="btn-gray" onclick="finishTest('Right: 0.4-0.6')">Middle rows / Средние строки</button>
                <button class="btn-gray" onclick="finishTest('Right: Low')">Top rows / Только верхние</button>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        let leftResult = "";

        function nextStep(result) {
            leftResult = result;
            document.getElementById('step-left').style.display = 'none';
            document.getElementById('step-right').style.display = 'block';
            window.scrollTo(0, 0);
        }

        function finishTest(rightResult) {
            const finalScore = leftResult + " | " + rightResult;
            tg.sendData(JSON.stringify({ action: 'vision_test_result', score: finalScore }));
            tg.close();
        }
    </script>
</body>
</html>
